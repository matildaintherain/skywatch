<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SkyWatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #090c12; --surface: #111520; --surface2: #182030;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --accent: #00e5c8; --text: #dde3f0; --muted: #5a6280;
  --danger: #ff5555; --warn: #ffb340;
  --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif; --r: 12px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* ALERT */
#alert-banner { background: var(--accent); color: #000; font-family: var(--mono); font-size: 0.78rem; font-weight: 700; text-align: center; padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.3s, padding 0.3s; letter-spacing: 0.03em; flex-shrink: 0; }
#alert-banner.show { max-height: 48px; padding: 0.55rem 1rem; }

/* HEADER */
header { padding: 0.75rem 1rem 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--accent); }
.logo span { color: var(--muted); font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 8px; }
.status-pill { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
.dot.live { background: var(--accent); animation: pulse 2s infinite; }
.dot.error { background: var(--danger); }
.dot.scanning { background: var(--warn); animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.25} }
.status-text { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.icon-btn { background: none; border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); padding: 4px 8px; cursor: pointer; font-size: 1rem; line-height: 1; transition: color 0.2s, border-color 0.2s; }
.icon-btn:hover { color: var(--accent); border-color: var(--accent); }
.icon-btn.spinning { animation: spin 0.7s linear; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOP CONTROLS */
#controls { padding: 0.55rem 1rem 0; display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
#loc-pill { display: flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 0.45rem 0.8rem; flex: 1; min-width: 0; }
.loc-coords { font-family: var(--mono); font-size: 0.72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.loc-acc { font-size: 0.62rem; color: var(--muted); }
#start-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0.45rem 0.85rem; font-family: var(--mono); font-size: 0.7rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0; transition: opacity 0.2s; }
#start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#start-btn.active { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

/* STATS */
.stats-bar { padding: 0.5rem 1rem 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; flex-shrink: 0; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 0.3rem; text-align: center; }
.stat-val { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--accent); display: block; line-height: 1.1; }
.stat-lbl { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-top: 1px; }

/* RADIUS */
#radius-bar { padding: 0.45rem 1rem 0; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.radius-lbl { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
#radius-slider { flex: 1; accent-color: var(--accent); cursor: pointer; }
.radius-val { font-family: var(--mono); font-size: 0.78rem; color: var(--accent); font-weight: 700; min-width: 52px; text-align: right; white-space: nowrap; }

/* MAP */
#map-wrap { flex: 1; position: relative; margin: 0.5rem 1rem 0; border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); min-height: 0; }
#map { width: 100%; height: 100%; }

/* Leaflet dark overrides */
.leaflet-tile { filter: brightness(0.75) saturate(0.6) hue-rotate(180deg) invert(1); }
.leaflet-container { background: #090c12; }
.leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border2) !important; }
.leaflet-control-attribution { background: rgba(9,12,18,0.8) !important; color: var(--muted) !important; font-size: 0.55rem !important; }
.leaflet-control-attribution a { color: var(--muted) !important; }

/* POPUP */
.leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r); box-shadow: 0 8px 32px rgba(0,0,0,0.6); padding: 0; }
.leaflet-popup-content { margin: 0; width: auto !important; min-width: 220px; max-width: 280px; }
.leaflet-popup-tip { background: var(--surface); }
.leaflet-popup-close-button { color: var(--muted) !important; font-size: 1.1rem !important; padding: 6px 8px !important; }

.popup-head { padding: 0.7rem 0.85rem 0.5rem; border-bottom: 1px solid var(--border); }
.popup-callsign { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: 1px; }
.popup-sub { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
.popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; padding: 0.6rem 0.85rem; }
.popup-fi-lbl { font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--mono); }
.popup-fi-val { font-size: 0.78rem; color: var(--text); font-family: var(--mono); margin-top: 1px; }
.popup-footer { padding: 0.35rem 0.85rem 0.65rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
.popup-dist { font-family: var(--mono); font-size: 0.7rem; color: var(--accent); font-weight: 700; }
.fa-link { font-size: 0.65rem; color: var(--muted); text-decoration: none; border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; font-family: var(--mono); transition: color 0.2s, border-color 0.2s; }
.fa-link:hover { color: var(--accent); border-color: var(--accent); }

/* LIST PANEL */
#list-panel { flex-shrink: 0; max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
#list-panel.open { max-height: 38vh; overflow-y: auto; }
#list-inner { padding: 0 1rem 1rem; }
.list-hdr { font-size: 0.62rem; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px; padding: 0.6rem 0 0.5rem; }
.list-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.fc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 0.55rem; padding: 0.65rem 0.85rem; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.2s; }
.fc:hover { border-color: var(--border2); }
.fc.is-new { border-color: var(--accent); }
.fc-plane { font-size: 1.3rem; flex-shrink: 0; }
.fc-main { flex: 1; min-width: 0; }
.fc-cs { font-family: var(--mono); font-size: 0.88rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 5px; }
.fc-cs .badge-new { font-size: 0.52rem; background: var(--accent); color: #000; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.fc-sub { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
.fc-dist { font-family: var(--mono); font-size: 0.78rem; color: var(--accent); font-weight: 700; flex-shrink: 0; }

/* BOTTOM BAR */
#bottom-bar { padding: 0.4rem 1rem 0.5rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-top: 1px solid var(--border); margin-top: 0.4rem; }
#last-updated { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); }
#toggle-list-btn { font-family: var(--mono); font-size: 0.62rem; color: var(--accent); background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 3px 9px; cursor: pointer; transition: background 0.2s; }
#toggle-list-btn:hover { background: var(--surface); }

/* Plane icon */
.plane-marker { transition: transform 0.5s ease; }
</style>
</head>
<body>

<div id="alert-banner"></div>

<header>
  <div class="logo">Sky<span>Watch</span></div>
  <div class="header-right">
    <div class="status-pill">
      <span class="dot" id="dot"></span>
      <span class="status-text" id="status-text">idle</span>
    </div>
    <button class="icon-btn" id="refresh-btn" title="Refresh now" onclick="manualRefresh()">↻</button>
  </div>
</header>

<div id="controls">
  <div id="loc-pill">
    <span>📍</span>
    <div style="min-width:0;flex:1">
      <div class="loc-coords" id="loc-coords">Location not acquired</div>
      <div class="loc-acc" id="loc-acc"></div>
    </div>
  </div>
  <button id="start-btn" onclick="startTracking()">Start</button>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-val" id="stat-count">—</span><span class="stat-lbl">Nearby</span></div>
  <div class="stat"><span class="stat-val" id="stat-seen">—</span><span class="stat-lbl">Today</span></div>
  <div class="stat"><span class="stat-val" id="stat-closest">—</span><span class="stat-lbl">Closest</span></div>
  <div class="stat"><span class="stat-val" id="stat-highest">—</span><span class="stat-lbl">Highest</span></div>
</div>

<div id="radius-bar">
  <span class="radius-lbl">Radius</span>
  <input type="range" id="radius-slider" min="10" max="500" step="10" value="100" oninput="onRadiusChange(this.value)">
  <span class="radius-val" id="radius-val">100 km</span>
</div>

<div id="map-wrap"><div id="map"></div></div>

<div id="list-panel"><div id="list-inner">
  <div class="list-hdr">Flights</div>
  <div id="flights-list"></div>
</div></div>

<div id="bottom-bar">
  <span id="last-updated"></span>
  <button id="toggle-list-btn" onclick="toggleList()">▲ Show list</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── WIDEBODY / NARROWBODY CLASSIFICATION ──
// A320 family, 737, E-jets etc = narrowbody. 777, 787, A330/340/350/380, 747, 767 = widebody.
const WIDEBODY = new Set([
  'A30B','A306','A310','A318','A332','A333','A338','A339','A342','A343','A345','A346',
  'A350','A358','A359','A35K','A380','A388',
  'B741','B742','B743','B744','B748','B74D','B74S',
  'B762','B763','B764','B772','B773','B77L','B77W','B778','B779',
  'B782','B783','B788','B789','B78X',
  'C5','C17','IL76','IL86','IL96','MD11','DC10','L101'
]);

// Heavier/military turboprops and bizjets — keep small
// Everything else defaults to narrowbody size

function isWidebody(typeCode) {
  return typeCode && WIDEBODY.has(typeCode.toUpperCase());
}

// ── SVG PLANE ICONS ──
function makePlaneIcon(wide, heading, isNew) {
  const size = wide ? 36 : 24;
  const color = isNew ? '#00e5c8' : (wide ? '#ffb340' : '#a0b0d0');
  const shadow = isNew ? 'drop-shadow(0 0 4px #00e5c8)' : 'none';
  // heading: 0=north, rotated so icon points in direction of travel
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" style="filter:${shadow};transform:rotate(${heading}deg);display:block">
    <path d="M12 2 L15.5 9 L22 10.5 L17 15 L18.5 22 L12 19 L5.5 22 L7 15 L2 10.5 L8.5 9 Z" fill="${color}" opacity="0.95"/>
    <circle cx="12" cy="12" r="2.5" fill="rgba(0,0,0,0.35)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: 'plane-marker',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}

// ── STATE ──
const APIS = [
  p => `https://api.airplanes.live/v2/point/${p[0]}/${p[1]}/${p[2]}`,
  p => `https://api.adsb.lol/v2/lat/${p[0]}/lon/${p[1]}/dist/${p[2]}`,
  p => `https://opendata.adsb.fi/api/v2/lat/${p[0]}/lon/${p[1]}/dist/${p[2]}`,
];

let myLat=null, myLon=null, radiusKm=100;
let seenIds=new Set(), seenToday=0;
let refreshInterval=null, countdownInterval=null, secondsLeft=30;
let isTracking=false, lastApi=0;
let markers={}, radiusCircle=null, myMarker=null;
let listOpen=false;

// ── MAP ──
const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([20, 78], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

// ── HELPERS ──
function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function showBanner(msg) {
  const b = document.getElementById('alert-banner');
  b.textContent = msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 5000);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.start(); o.stop(ctx.currentTime + 0.5);
  } catch(e){}
  if ('vibrate' in navigator) navigator.vibrate([150,80,150]);
}

function haversineKm(la1,lo1,la2,lo2) {
  const R=6371, r=d=>d*Math.PI/180;
  const a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

function compass(d) {
  return d==null?'—':['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8];
}

function fmt(v, suffix, decimals=0) {
  if (v==null) return '—';
  return (decimals?v.toFixed(decimals):Math.round(v)).toLocaleString() + suffix;
}

// ── RADIUS / UI ──
function onRadiusChange(val) {
  radiusKm = parseInt(val);
  document.getElementById('radius-val').textContent = radiusKm + ' km';
  if (radiusCircle) radiusCircle.setRadius(radiusKm * 1000);
  if (isTracking) fetchFlights();
}

function toggleList() {
  listOpen = !listOpen;
  document.getElementById('list-panel').classList.toggle('open', listOpen);
  document.getElementById('toggle-list-btn').textContent = listOpen ? '▼ Hide list' : '▲ Show list';
  setTimeout(() => map.invalidateSize(), 360);
}

function manualRefresh() {
  if (!isTracking) return;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 700);
  secondsLeft = 30;
  fetchFlights();
}

// ── TRACKING ──
function startTracking() {
  if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
  const btn = document.getElementById('start-btn');
  btn.disabled = true; btn.textContent = 'Locating…';
  setStatus('scanning', 'locating');

  navigator.geolocation.watchPosition(pos => {
    myLat = pos.coords.latitude; myLon = pos.coords.longitude;
    const acc = Math.round(pos.coords.accuracy);
    document.getElementById('loc-coords').textContent = myLat.toFixed(5)+'°, '+myLon.toFixed(5)+'°';
    document.getElementById('loc-acc').textContent = '± '+acc+' m';
    btn.textContent = 'Live'; btn.classList.add('active'); btn.disabled = true;

    // Place / move my location marker
    if (!myMarker) {
      const myIcon = L.divIcon({
        html: `<div style="width:14px;height:14px;border-radius:50%;background:#00e5c8;border:2px solid #fff;box-shadow:0 0 8px #00e5c8"></div>`,
        className:'', iconSize:[14,14], iconAnchor:[7,7]
      });
      myMarker = L.marker([myLat,myLon],{icon:myIcon,zIndexOffset:1000}).addTo(map).bindTooltip('You',{permanent:false});
    } else {
      myMarker.setLatLng([myLat,myLon]);
    }

    // Radius circle
    if (!radiusCircle) {
      radiusCircle = L.circle([myLat,myLon],{
        radius: radiusKm*1000, color:'#00e5c8', weight:1,
        fillColor:'#00e5c8', fillOpacity:0.04
      }).addTo(map);
    } else {
      radiusCircle.setLatLng([myLat,myLon]);
    }

    if (!isTracking) {
      isTracking = true;
      map.setView([myLat,myLon], 8);
      fetchFlights();
      startCountdown();
    }
  }, err => {
    setStatus('error','gps error'); btn.disabled=false; btn.textContent='Retry'; btn.classList.remove('active');
  }, { enableHighAccuracy:true, timeout:15000 });
}

function startCountdown() {
  clearInterval(countdownInterval); clearInterval(refreshInterval);
  secondsLeft = 30;
  countdownInterval = setInterval(() => {
    secondsLeft = Math.max(0,secondsLeft-1);
    document.getElementById('last-updated').textContent = secondsLeft>0 ? 'Next scan in '+secondsLeft+'s' : 'Scanning…';
  }, 1000);
  refreshInterval = setInterval(() => { secondsLeft=30; fetchFlights(); }, 30000);
}

// ── FETCH ──
async function fetchFlights() {
  if (!myLat||!myLon) return;
  setStatus('scanning','scanning');
  const nm = Math.ceil(radiusKm*0.54);
  const p = [myLat.toFixed(4), myLon.toFixed(4), nm];
  const order = [...Array(APIS.length).keys()];
  order.unshift(...order.splice(lastApi,1));

  for (const i of order) {
    try {
      const res = await fetch(APIS[i](p));
      if (!res.ok) continue;
      const data = await res.json();
      lastApi = i;
      processFlights(data.ac || []);
      setStatus('live','live');
      const now = new Date();
      document.getElementById('last-updated').textContent =
        'Updated '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      return;
    } catch(e){}
  }
  setStatus('error','error');
  document.getElementById('last-updated').textContent = 'Fetch failed — tap ↻ to retry';
}

// ── PROCESS ──
function processFlights(aircraft) {
  const nearby = [];
  for (const ac of aircraft) {
    if (ac.lat==null||ac.lon==null) continue;
    const dist = haversineKm(myLat,myLon,ac.lat,ac.lon);
    if (dist<=radiusKm) nearby.push({ac,dist});
  }
  nearby.sort((a,b)=>a.dist-b.dist);

  const currentIds = new Set(nearby.map(f=>f.ac.hex));
  const newOnes = [...currentIds].filter(id=>!seenIds.has(id));
  newOnes.forEach(id=>{seenIds.add(id);seenToday++;});

  if (newOnes.length>0) {
    const first = nearby.find(f=>newOnes.includes(f.ac.hex));
    const lbl = (first?.ac.flight||first?.ac.hex||'A flight').trim();
    showBanner('✈ '+lbl+' entered your '+radiusKm+' km zone!');
    if ('Notification' in window && Notification.permission==='granted')
      new Notification('SkyWatch',{body:lbl+' is flying nearby!'});
  }

  // Stats
  const highest = nearby.reduce((m,f)=>Math.max(m,f.ac.alt_baro||0),0);
  document.getElementById('stat-count').textContent = nearby.length;
  document.getElementById('stat-seen').textContent = seenToday;
  document.getElementById('stat-closest').textContent = nearby.length ? nearby[0].dist.toFixed(1) : '—';
  document.getElementById('stat-highest').textContent = nearby.length && highest ? Math.round(highest/1000)+'k' : '—';

  updateMap(nearby, newOnes);
  renderList(nearby, newOnes);

  if ('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}

// ── MAP UPDATE ──
function updateMap(nearby, newOnes) {
  const seen = new Set();

  for (const {ac, dist} of nearby) {
    const id = ac.hex;
    seen.add(id);
    const wide = isWidebody(ac.t);
    const hdg = ac.track || 0;
    const isNew = newOnes.includes(id);
    const icon = makePlaneIcon(wide, hdg, isNew);

    if (markers[id]) {
      markers[id].setLatLng([ac.lat, ac.lon]);
      markers[id].setIcon(icon);
    } else {
      const m = L.marker([ac.lat, ac.lon], {icon}).addTo(map);
      m.bindPopup(() => buildPopup(ac, dist), {maxWidth:300, minWidth:240});
      markers[id] = m;
    }

    // Update popup content if open
    if (markers[id].isPopupOpen()) {
      markers[id].setPopupContent(buildPopup(ac, dist));
    }
  }

  // Remove markers for flights that left
  for (const id of Object.keys(markers)) {
    if (!seen.has(id)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  }
}

function buildPopup(ac, dist) {
  const cs = (ac.flight||'').trim() || (ac.hex||'').toUpperCase() || '—';
  const icao = (ac.hex||'—').toUpperCase();
  const wide = isWidebody(ac.t);
  const acClass = wide ? 'Widebody' : 'Narrowbody';
  const alt   = ac.alt_baro!=null ? Math.round(ac.alt_baro).toLocaleString()+' ft' : '—';
  const spd   = ac.gs!=null ? Math.round(ac.gs*1.852)+' km/h' : '—';
  const hdg   = ac.track!=null ? Math.round(ac.track)+'° '+compass(ac.track) : '—';
  const vr    = ac.baro_rate!=null ? (ac.baro_rate>=0?'↑ ':'↓ ')+Math.abs(Math.round(ac.baro_rate)).toLocaleString()+' ft/min' : '—';
  const status= ac.on_ground ? '🛬 On ground' : '✈ Airborne';
  const reg   = ac.r||'—';
  const type  = ac.t||'—';
  const sqk   = ac.squawk||'—';
  const src   = ac.type||'ADS-B';
  const faUrl = 'https://www.flightaware.com/live/flight/'+cs;

  const el = document.createElement('div');
  el.innerHTML = `
    <div class="popup-head">
      <div class="popup-callsign">${cs}</div>
      <div class="popup-sub">${acClass} &middot; Reg: ${reg} &middot; Type: ${type}</div>
      <div class="popup-sub" style="margin-top:2px">ICAO: ${icao} &middot; Squawk: ${sqk}</div>
    </div>
    <div class="popup-grid">
      <div><div class="popup-fi-lbl">Altitude</div><div class="popup-fi-val">${alt}</div></div>
      <div><div class="popup-fi-lbl">Speed</div><div class="popup-fi-val">${spd}</div></div>
      <div><div class="popup-fi-lbl">Heading</div><div class="popup-fi-val">${hdg}</div></div>
      <div><div class="popup-fi-lbl">Vert rate</div><div class="popup-fi-val">${vr}</div></div>
      <div><div class="popup-fi-lbl">Status</div><div class="popup-fi-val">${status}</div></div>
      <div><div class="popup-fi-lbl">Source</div><div class="popup-fi-val">${src}</div></div>
      <div><div class="popup-fi-lbl">Latitude</div><div class="popup-fi-val">${ac.lat.toFixed(4)}°</div></div>
      <div><div class="popup-fi-lbl">Longitude</div><div class="popup-fi-val">${ac.lon.toFixed(4)}°</div></div>
    </div>
    <div class="popup-footer">
      <span class="popup-dist">${dist.toFixed(1)} km away</span>
      <a class="fa-link" href="${faUrl}" target="_blank" rel="noopener">FlightAware ↗</a>
    </div>`;
  return el;
}

// ── LIST ──
function renderList(nearby, newOnes) {
  const list = document.getElementById('flights-list');
  list.innerHTML = '';
  for (const {ac, dist} of nearby) {
    const cs   = (ac.flight||'').trim() || (ac.hex||'').toUpperCase() || '—';
    const isNew = newOnes.includes(ac.hex);
    const wide  = isWidebody(ac.t);
    const alt   = ac.alt_baro!=null ? Math.round(ac.alt_baro).toLocaleString()+' ft' : '—';
    const spd   = ac.gs!=null ? Math.round(ac.gs*1.852)+' km/h' : '—';
    const icon  = wide ? '✈' : '🛩';

    const row = document.createElement('div');
    row.className = 'fc'+(isNew?' is-new':'');
    row.innerHTML = `
      <span class="fc-plane">${icon}</span>
      <div class="fc-main">
        <div class="fc-cs">${cs}${isNew?'<span class="badge-new">NEW</span>':''}</div>
        <div class="fc-sub">${ac.t||'?'} &middot; ${alt} &middot; ${spd}</div>
      </div>
      <span class="fc-dist">${dist.toFixed(1)} km</span>`;
    row.onclick = () => {
      if (markers[ac.hex]) {
        map.setView([ac.lat,ac.lon], 10, {animate:true});
        markers[ac.hex].openPopup();
        if (listOpen) toggleList();
      }
    };
    list.appendChild(row);
  }
}
</script>

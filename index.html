<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SkyWatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #090c12;
  --surface: #111520;
  --surface2: #182030;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #00e5c8;
  --text: #dde3f0;
  --muted: #5a6280;
  --danger: #ff5555;
  --warn: #ffb340;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --r: 12px;
}

html, body { height: 100%; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── ALERT BANNER (no position:fixed) ── */
#alert-banner {
  background: var(--accent);
  color: #000;
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 700;
  text-align: center;
  padding: 0.6rem 1rem;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  letter-spacing: 0.03em;
}
#alert-banner.show { max-height: 60px; padding: 0.6rem 1rem; }

/* ── HEADER ── */
header {
  padding: 1rem 1.25rem 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.logo { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; color: var(--accent); }
.logo span { color: var(--muted); font-weight: 400; }

.header-right { display: flex; align-items: center; gap: 10px; }

.status-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); transition: background 0.3s;
}
.dot.live { background: var(--accent); animation: pulse 2s infinite; }
.dot.error { background: var(--danger); }
.dot.scanning { background: var(--warn); animation: pulse 0.8s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.status-text { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

#refresh-btn {
  background: none; border: 1px solid var(--border2); border-radius: 8px;
  color: var(--muted); padding: 5px 8px; cursor: pointer; font-size: 1rem;
  transition: color 0.2s, border-color 0.2s;
  line-height: 1;
}
#refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
#refresh-btn.spinning { animation: spin 0.7s linear; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LOCATION BAR ── */
#loc-bar {
  margin: 0.85rem 1.25rem 0;
  padding: 0.7rem 1rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  display: flex; align-items: center; gap: 10px;
}
.loc-text { flex: 1; min-width: 0; }
.loc-coords { font-family: var(--mono); font-size: 0.78rem; color: var(--text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.loc-acc { font-size: 0.68rem; color: var(--muted); margin-top: 1px; display: block; }

#start-btn {
  background: var(--accent); color: #000;
  border: none; border-radius: 8px;
  padding: 0.45rem 0.9rem;
  font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
  cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
  white-space: nowrap; flex-shrink: 0;
  transition: opacity 0.2s, background 0.3s;
}
#start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#start-btn.active { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

/* ── STATS ── */
.stats-bar {
  margin: 0.6rem 1.25rem 0;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 0.6rem 0.5rem; text-align: center;
}
.stat-val { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; color: var(--accent); display: block; line-height: 1.1; }
.stat-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; display: block; }

/* ── RADIUS SLIDER ── */
#radius-bar {
  margin: 0.6rem 1.25rem 0;
  padding: 0.65rem 1rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
}
.radius-row { display: flex; align-items: center; gap: 10px; }
.radius-lbl { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
#radius-slider { flex: 1; accent-color: var(--accent); cursor: pointer; }
.radius-val { font-family: var(--mono); font-size: 0.82rem; color: var(--accent); font-weight: 700; min-width: 52px; text-align: right; white-space: nowrap; }

/* ── FLIGHTS SECTION ── */
#flights-section { flex: 1; padding: 0.75rem 1.25rem 2rem; overflow-y: auto; }

.section-hdr {
  font-size: 0.65rem; font-family: var(--mono); color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 0.65rem; display: flex; align-items: center; gap: 8px;
}
.section-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── EMPTY / ERROR STATES ── */
.state-box {
  text-align: center; padding: 2.5rem 1rem; color: var(--muted);
}
.state-icon { font-size: 2.2rem; display: block; margin-bottom: 0.6rem; }
.state-title { font-size: 0.9rem; color: var(--text); font-weight: 500; margin-bottom: 0.3rem; }
.state-sub { font-size: 0.8rem; line-height: 1.6; }
.state-sub a { color: var(--accent); text-decoration: none; }

/* ── FLIGHT CARD ── */
.flight-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 0.7rem; overflow: hidden;
  animation: slideIn 0.25s ease;
}
.flight-card.is-new { border-color: var(--accent); }

@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

.card-top {
  padding: 0.8rem 1rem 0.55rem;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.callsign { font-family: var(--mono); font-size: 1.15rem; font-weight: 700; color: var(--text); letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
.badge-new { font-size: 0.55rem; background: var(--accent); color: #000; padding: 2px 5px; border-radius: 3px; font-weight: 700; letter-spacing: 0.05em; vertical-align: middle; }
.card-sub { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
.card-dist { font-family: var(--mono); font-size: 0.88rem; color: var(--accent); font-weight: 700; text-align: right; flex-shrink: 0; }
.card-dist small { display: block; font-size: 0.6rem; color: var(--muted); font-weight: 400; }

.card-grid {
  padding: 0 1rem 0.8rem;
  display: grid; grid-template-columns: 1fr 1fr; gap: 7px 14px;
  border-top: 1px solid var(--border); padding-top: 0.6rem;
  margin: 0 1rem 0.8rem;
}
.fi-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--mono); }
.fi-val { font-size: 0.8rem; color: var(--text); font-family: var(--mono); margin-top: 1px; }

.card-footer {
  padding: 0.4rem 1rem 0.65rem;
  display: flex; justify-content: flex-end;
}
.fa-link {
  font-size: 0.68rem; color: var(--muted); text-decoration: none; font-family: var(--mono);
  border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px;
  transition: color 0.2s, border-color 0.2s;
}
.fa-link:hover { color: var(--accent); border-color: var(--accent); }

/* ── LAST UPDATED ── */
#last-updated {
  text-align: center; font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
  padding: 0.3rem 0 0;
}
</style>
</head>
<body>

<div id="alert-banner"></div>

<header>
  <div class="logo">Sky<span>Watch</span></div>
  <div class="header-right">
    <div class="status-pill">
      <span class="dot" id="dot"></span>
      <span class="status-text" id="status-text">idle</span>
    </div>
    <button id="refresh-btn" title="Refresh now" onclick="manualRefresh()">↻</button>
  </div>
</header>

<div id="loc-bar">
  <span style="font-size:1.1rem">📍</span>
  <div class="loc-text">
    <span class="loc-coords" id="loc-coords">Location not acquired</span>
    <span class="loc-acc" id="loc-acc"></span>
  </div>
  <button id="start-btn" onclick="startTracking()">Start</button>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-val" id="stat-count">—</span><span class="stat-lbl">Nearby</span></div>
  <div class="stat"><span class="stat-val" id="stat-seen">—</span><span class="stat-lbl">Seen today</span></div>
  <div class="stat"><span class="stat-val" id="stat-closest">—</span><span class="stat-lbl">Closest km</span></div>
</div>

<div id="radius-bar">
  <div class="radius-row">
    <span class="radius-lbl">Radius</span>
    <input type="range" id="radius-slider" min="10" max="500" step="10" value="100" oninput="onRadiusChange(this.value)">
    <span class="radius-val" id="radius-val">100 km</span>
  </div>
</div>

<div id="flights-section">
  <div id="state-area"></div>
  <div id="section-hdr" class="section-hdr" style="display:none">Flights within 100 km</div>
  <div id="flights-list"></div>
  <div id="last-updated"></div>
</div>

<script>
const APIS = [
  lat => `https://api.airplanes.live/v2/point/${lat[0]}/${lat[1]}/${lat[2]}`,
  lat => `https://api.adsb.lol/v2/lat/${lat[0]}/lon/${lat[1]}/dist/${lat[2]}`,
  lat => `https://opendata.adsb.fi/api/v2/lat/${lat[0]}/lon/${lat[1]}/dist/${lat[2]}`,
];

let myLat = null, myLon = null;
let radiusKm = 100;
let seenIds = new Set();
let seenToday = 0;
let refreshInterval = null;
let countdownInterval = null;
let secondsLeft = 30;
let isTracking = false;
let lastSuccessfulApi = 0;

function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function setState(icon, title, sub) {
  document.getElementById('state-area').innerHTML =
    `<div class="state-box"><span class="state-icon">${icon}</span><div class="state-title">${title}</div><div class="state-sub">${sub}</div></div>`;
  document.getElementById('section-hdr').style.display = 'none';
}

function showBanner(msg) {
  const b = document.getElementById('alert-banner');
  b.textContent = msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 5000);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
  if ('vibrate' in navigator) navigator.vibrate([150, 80, 150]);
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function compass(deg) {
  if (deg == null) return '—';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
}

function onRadiusChange(val) {
  radiusKm = parseInt(val);
  document.getElementById('radius-val').textContent = radiusKm + ' km';
  document.getElementById('section-hdr').textContent = 'Flights within ' + radiusKm + ' km';
  if (isTracking) fetchFlights();
}

function manualRefresh() {
  if (!isTracking) return;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 700);
  secondsLeft = 30;
  fetchFlights();
}

function startTracking() {
  if (!navigator.geolocation) {
    setState('🚫', 'Not supported', 'Your browser does not support location access.');
    return;
  }
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.textContent = 'Locating…';
  setStatus('scanning', 'locating');
  setState('📡', 'Getting your location…', 'Please allow location access when prompted.');

  navigator.geolocation.watchPosition(pos => {
    myLat = pos.coords.latitude;
    myLon = pos.coords.longitude;
    const acc = Math.round(pos.coords.accuracy);
    document.getElementById('loc-coords').textContent = myLat.toFixed(5) + '°, ' + myLon.toFixed(5) + '°';
    document.getElementById('loc-acc').textContent = '± ' + acc + ' m';
    btn.textContent = 'Live';
    btn.classList.add('active');
    btn.disabled = true;

    if (!isTracking) {
      isTracking = true;
      fetchFlights();
      startCountdown();
    }
  }, err => {
    setStatus('error', 'gps error');
    btn.disabled = false; btn.textContent = 'Retry';
    btn.classList.remove('active');
    const msgs = ['', 'Location permission denied. Please allow it in your browser settings.', 'Location unavailable. Try again.', 'Location request timed out.'];
    setState('📍', 'Location error', msgs[err.code] || err.message);
  }, { enableHighAccuracy: true, timeout: 15000 });
}

function startCountdown() {
  clearInterval(countdownInterval);
  secondsLeft = 30;
  countdownInterval = setInterval(() => {
    secondsLeft = Math.max(0, secondsLeft - 1);
    if (secondsLeft > 0) {
      document.getElementById('last-updated').textContent = 'Next scan in ' + secondsLeft + 's';
    }
  }, 1000);
  clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    secondsLeft = 30;
    fetchFlights();
  }, 30000);
}

async function fetchFlights() {
  if (!myLat || !myLon) return;
  setStatus('scanning', 'scanning');
  const distNm = Math.ceil(radiusKm * 0.54);
  const args = [myLat.toFixed(4), myLon.toFixed(4), distNm];

  // Try APIs in order, remembering the last one that worked
  const order = [...Array(APIS.length).keys()];
  order.splice(0, 0, ...order.splice(lastSuccessfulApi, 1));

  for (const i of order) {
    try {
      const res = await fetch(APIS[i](args));
      if (!res.ok) continue;
      const data = await res.json();
      lastSuccessfulApi = i;
      processFlights(data.ac || []);
      setStatus('live', 'live');
      const now = new Date();
      document.getElementById('last-updated').textContent =
        'Updated at ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      return;
    } catch(e) {}
  }

  setStatus('error', 'error');
  setState('⚠️', 'Could not fetch flight data',
    'All sources failed. Check your connection and <a href="#" onclick="manualRefresh();return false;">tap to retry</a>.');
}

function processFlights(aircraft) {
  const nearby = [];
  for (const ac of aircraft) {
    if (ac.lat == null || ac.lon == null) continue;
    const dist = haversineKm(myLat, myLon, ac.lat, ac.lon);
    if (dist <= radiusKm) nearby.push({ ac, dist });
  }
  nearby.sort((a, b) => a.dist - b.dist);

  // Only count truly new flights (not seen in this session at all)
  const currentIds = new Set(nearby.map(f => f.ac.hex));
  const newOnes = [...currentIds].filter(id => !seenIds.has(id));
  newOnes.forEach(id => { seenIds.add(id); seenToday++; });

  if (newOnes.length > 0) {
    const first = nearby.find(f => newOnes.includes(f.ac.hex));
    const label = (first?.ac.flight || first?.ac.hex || 'A flight').trim();
    showBanner('✈ ' + label + ' entered your ' + radiusKm + ' km zone!');
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('SkyWatch', { body: label + ' is flying nearby!' });
    }
  }

  document.getElementById('stat-count').textContent = nearby.length;
  document.getElementById('stat-seen').textContent = seenToday;
  document.getElementById('stat-closest').textContent = nearby.length ? nearby[0].dist.toFixed(1) : '—';

  if (nearby.length === 0) {
    setState('🛫', 'No flights nearby', 'The skies within ' + radiusKm + ' km are clear right now. Next scan in 30s.');
    document.getElementById('section-hdr').style.display = 'none';
  } else {
    document.getElementById('state-area').innerHTML = '';
    document.getElementById('section-hdr').style.display = 'flex';
    document.getElementById('section-hdr').textContent = 'Flights within ' + radiusKm + ' km';
  }

  renderFlights(nearby, newOnes);

  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function renderFlights(nearby, newOnes) {
  const list = document.getElementById('flights-list');
  list.innerHTML = '';

  for (const { ac, dist } of nearby) {
    const icao = (ac.hex || '').toUpperCase();
    const cs = (ac.flight || '').trim() || icao || '—';
    const isNew = newOnes.includes(ac.hex);

    const alt = ac.alt_baro != null ? Math.round(ac.alt_baro).toLocaleString() + ' ft' : '—';
    const spd = ac.gs != null ? Math.round(ac.gs * 1.852) + ' km/h' : '—';
    const hdg = ac.track != null ? Math.round(ac.track) + '° ' + compass(ac.track) : '—';
    const vr  = ac.baro_rate != null
      ? (ac.baro_rate >= 0 ? '↑ ' : '↓ ') + Math.abs(Math.round(ac.baro_rate)).toLocaleString() + ' ft/min'
      : '—';
    const status = ac.on_ground ? '🛬 On ground' : '✈ Airborne';
    const reg  = ac.r || '—';
    const type = ac.t || '—';
    const faUrl = 'https://www.flightaware.com/live/flight/' + cs;

    const card = document.createElement('div');
    card.className = 'flight-card' + (isNew ? ' is-new' : '');
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="callsign">${cs}${isNew ? '<span class="badge-new">NEW</span>' : ''}</div>
          <div class="card-sub">Reg: ${reg} &middot; Type: ${type} &middot; ICAO: ${icao}</div>
        </div>
        <div class="card-dist">${dist.toFixed(1)} km<small>away</small></div>
      </div>
      <div class="card-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:7px 14px;border-top:1px solid var(--border);padding:0.6rem 1rem 0.8rem;margin:0 0 0 0;">
        <div><div class="fi-label">Altitude</div><div class="fi-val">${alt}</div></div>
        <div><div class="fi-label">Speed</div><div class="fi-val">${spd}</div></div>
        <div><div class="fi-label">Heading</div><div class="fi-val">${hdg}</div></div>
        <div><div class="fi-label">Vert rate</div><div class="fi-val">${vr}</div></div>
        <div><div class="fi-label">Status</div><div class="fi-val">${status}</div></div>
        <div><div class="fi-label">Squawk</div><div class="fi-val">${ac.squawk || '—'}</div></div>
        <div><div class="fi-label">Latitude</div><div class="fi-val">${ac.lat.toFixed(4)}°</div></div>
        <div><div class="fi-label">Longitude</div><div class="fi-val">${ac.lon.toFixed(4)}°</div></div>
      </div>
      <div class="card-footer">
        <a class="fa-link" href="${faUrl}" target="_blank" rel="noopener">View on FlightAware ↗</a>
      </div>`;
    list.appendChild(card);
  }
}

// Show initial state
setState('📡', 'Ready to scan', 'Tap <strong>Start</strong> to find flights within your chosen radius.');
</script>
</body>
</html>
